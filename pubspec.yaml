name: OnListClub
description: A new Flutter project.
version: 1.0.0+1
environment: 
  sdk: ^3.6.0
dependencies: 
  flutter:   # 🚨 CRITICAL: Required for every Flutter project - DO NOT REMOVE
    sdk: flutter # 🚨 CRITICAL: Required for every Flutter project - DO NOT REMOVE
  flutter_localizations: 
    sdk: flutter
  flutter_svg: ^2.0.12
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.3
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  supabase_flutter: ^2.6.0
  intl_phone_number_input: ^0.7.4
  google_fonts: ^8.0.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^6.1.2
  crypto: ^3.0.3
  geolocator: ^13.0.0
  url_launcher: ^6.3.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0
  geocoding: ^4.0.0
dev_dependencies:
  flutter_test:    # 🚨 CRITICAL: Required for Flutter project testing - DO NOT REMOVE
    sdk: flutter   # 🚨 CRITICAL: Required for Flutter project testing - DO NOT REMOVE
  flutter_launcher_icons: ^0.13.1
# ...resto del file...   

flutter:
  uses-material-design: true # 🚨 CRITICAL: Required for Material icon font - DO NOT REMOVE
  assets:
    - assets/
    - assets/images/
    - env.json
  fonts:
    - family: HelveticaNeue
      fonts:
        - asset: assets/fonts/HelveticaNeueLight.otf
          weight: 300
        - asset: assets/fonts/HelveticaNeueRoman.otf
          weight: 400
        - asset: assets/fonts/HelveticaNeueMedium.otf
          weight: 500
        - asset: assets/fonts/HelveticaNeueBold.otf
          weight: 700

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_onlist.png"
  remove_alpha_ios: true
  background_color_ios: "#000000"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo_onlist.png"
