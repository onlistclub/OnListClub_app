# Limita la heap a 1.5GB o max 2GB. Il Metaspace a 256MB o 512MB è sufficiente.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=256m -XX:+HeapDumpOnOutOfMemoryError

# Fondamentale per PC con poca RAM: chiude Gradle dopo la compilazione
org.gradle.daemon=false

# Mantieni queste per la compatibilità
android.useAndroidX=true
android.enableJetifier=false

# Ottimizzazione per risparmiare cicli di memoria
org.gradle.parallel=false
org.gradle.caching=true